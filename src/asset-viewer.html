<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark" />
<title data-i18n="assetViewerPageName"></title>
<link rel="stylesheet" href="lib/codemirror/lib/codemirror.css">
<link rel="stylesheet" href="lib/codemirror/addon/search/matchesonscrollbar.css">
<link rel="stylesheet" href="css/themes/default.css">
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/fa-icons.css">
<link rel="stylesheet" href="css/codemirror.css">
<link rel="stylesheet" href="css/asset-viewer.css">
<link rel="icon" type="image/png" href="img/icon_64.png">
</head>
<body class="loading">

<main class="viewerShell">
    <section class="viewerHero">
        <div class="heroCopy">
            <p class="eyebrow">uBlockVanced</p>
            <h1 id="assetHeading"></h1>
            <p class="lead" data-i18n="assetViewerLead"></p>
            <p id="assetMeta" class="assetMeta"></p>
        </div>
        <div id="assetStatus" class="statusCluster" role="status" aria-live="polite" aria-atomic="true">
            <span id="assetStatusPrimary" class="statusPill" data-tone="running" data-i18n="assetViewerStatusLoading"></span>
            <span id="assetTrustState" class="statusPill"></span>
            <span id="assetLineCount" class="statusPill"></span>
            <a id="assetSourceLink" class="sourceLink hide" target="_blank" rel="noopener noreferrer" data-i18n="assetViewerOpenSource" href="#"></a>
        </div>
    </section>

    <section id="subscribe" class="hide notice" aria-live="polite">
        <span class="logo"><img data-i18n-title="extName" src="img/ublock.svg" alt=""></span>
        <div class="subscribeCopy">
            <p class="subscribeEyebrow" data-i18n="assetViewerSubscribeEyebrow"></p>
            <p id="subscribeTitle" class="subscribeTitle"></p>
            <p class="subscribeHint" data-i18n="assetViewerSubscribeHint"></p>
            <a id="subscribeTarget" class="subscribeTarget" target="_blank" rel="noopener noreferrer"></a>
        </div>
        <div class="subscribeActions">
            <span id="subscribeState" class="statusPill" data-tone="warning" data-i18n="assetViewerSubscribePending"></span>
            <span class="fa-icon" aria-hidden="true">spinner</span>
            <button id="subscribeButton" type="button" data-i18n="subscribeButton">_<span class="hover"></span></button>
        </div>
    </section>
</main>

<div id="content" class="codeMirrorContainer codeMirrorBreakAll cm-theme-override"></div>

<script src="lib/codemirror/lib/codemirror.js"></script>
<script src="lib/codemirror/addon/display/panel.js"></script>
<script src="lib/codemirror/addon/edit/matchbrackets.js"></script>
<script src="lib/codemirror/addon/fold/foldcode.js"></script>
<script src="lib/codemirror/addon/scroll/annotatescrollbar.js"></script>
<script src="lib/codemirror/addon/search/searchcursor.js"></script>
<script src="lib/codemirror/addon/selection/active-line.js"></script>
<script src="lib/hsluv/hsluv-0.1.0.min.js"></script>

<script src="js/vapi.js"></script>
<script src="js/vapi-common.js"></script>
<script src="js/vapi-client.js"></script>

<script src="js/codemirror/search.js" type="module"></script>
<script src="js/codemirror/search-thread.js"></script>

<script src="js/fa-icons.js" type="module"></script>
<script src="js/theme.js" type="module"></script>
<script src="js/i18n.js" type="module"></script>
<script src="js/dashboard-common.js" type="module"></script>
<script src="js/asset-viewer.js" type="module"></script>

</body>
</html>
