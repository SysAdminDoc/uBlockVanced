<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark" />
<title data-i18n="advancedSettingsPageName"></title>

<link rel="stylesheet" href="lib/codemirror/lib/codemirror.css">

<link rel="stylesheet" href="css/themes/default.css">
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/fa-icons.css">
<link rel="stylesheet" href="css/dashboard-common.css">
<link rel="stylesheet" href="css/advanced-settings.css">
<link rel="stylesheet" href="css/codemirror.css">
<link rel="icon" type="image/png" href="img/icon_64.png">
</head>

<body>
<div class="body">
    <header class="editorHero">
        <div class="editorHeroCopy">
            <div class="editorEyebrow" translate="no">uBlockVanced</div>
            <h1 class="editorTitle" data-i18n="advancedSettingsPageName"></h1>
            <p class="editorLead" data-i18n="advancedSettingsLead"></p>
        </div>
        <div id="advancedSettingsStatus" class="editorStatus" role="status" aria-live="polite" aria-atomic="true">
            <span id="advancedSettingsSaveState" class="statusPill"></span>
            <span id="advancedSettingsCustomizedState" class="statusPill"></span>
            <span id="advancedSettingsLockState" class="statusPill"></span>
        </div>
    </header>
    <section class="advancedNotice" aria-labelledby="advancedNoticeTitle">
        <div class="advancedNoticeHead">
            <div>
                <div class="advancedNoticeEyebrow" data-i18n="advancedSettingsRiskEyebrow"></div>
                <h2 id="advancedNoticeTitle" class="advancedNoticeTitle" data-i18n="advancedSettingsRiskTitle"></h2>
            </div>
            <a class="advancedGuideLink" href="https://github.com/gorhill/uBlock/wiki/Advanced-settings" target="_blank" rel="noopener noreferrer" data-i18n-title="genericOpenDocumentation">
                <span class="fa-icon">info-circle</span>
                <span data-i18n="advancedSettingsGuideAction"></span>
            </a>
        </div>
        <p class="advancedNoticeLead" data-i18n="advancedSettingsWarning"></p>
        <p id="advancedSettingsPolicyHint" class="advancedPolicyHint"></p>
    </section>
    <div class="actionBar advancedActions">
        <div class="advancedActionsPrimary">
            <button id="advancedSettingsApply" class="preferred iconified" type="button" disabled><span class="fa-icon">check</span><span data-i18n="genericApplyChanges">_</span><span class="hover"></span></button>
            <button id="advancedSettingsRevert" class="iconified" type="button" disabled><span class="fa-icon">undo</span><span data-i18n="genericRevert">_</span><span class="hover"></span></button>
        </div>
        <p class="advancedActionsHint" data-i18n="advancedSettingsToolbarHint"></p>
    </div>
</div>

<div id="advancedSettings" class="codeMirrorContainer cm-theme-override" data-dirty="false"></div>

<script src="lib/codemirror/lib/codemirror.js"></script>
<script src="lib/codemirror/addon/selection/active-line.js"></script>
<script src="lib/hsluv/hsluv-0.1.0.min.js"></script>

<script src="js/fa-icons.js" type="module"></script>
<script src="js/vapi.js"></script>
<script src="js/vapi-common.js"></script>
<script src="js/vapi-client.js"></script>
<script src="js/theme.js" type="module"></script>
<script src="js/i18n.js" type="module"></script>
<script src="js/dashboard-common.js" type="module"></script>
<script src="js/advanced-settings.js" type="module"></script>

</body>
</html>
