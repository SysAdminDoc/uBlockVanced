<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark" />
<title data-i18n="devtoolsPageName"></title>

<link rel="stylesheet" href="lib/codemirror/lib/codemirror.css">
<link rel="stylesheet" href="lib/codemirror/addon/fold/foldgutter.css">
<link rel="stylesheet" href="lib/codemirror/addon/search/matchesonscrollbar.css">

<link rel="stylesheet" href="css/themes/default.css">
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/fa-icons.css">
<link rel="stylesheet" href="css/dashboard-common.css">
<link rel="stylesheet" href="css/cloud-ui.css">
<link rel="stylesheet" href="css/devtools.css">
<link rel="stylesheet" href="css/codemirror.css">
</head>

<body>

<main class="body">
    <section class="devtoolsHero">
        <div class="heroCopy">
            <p class="eyebrow">uBlockVanced</p>
            <h1 data-i18n="devtoolsPageTitle"></h1>
            <p class="lead" data-i18n="devtoolsPageLead"></p>
            <p class="helperCopy" data-i18n="devtoolsQueryHelp"></p>
        </div>
        <div id="devtoolsStatus" class="statusCluster" role="status" aria-live="polite" aria-atomic="true">
            <span id="devtoolsStatusPrimary" class="statusPill" data-tone="neutral" data-i18n="devtoolsStatusReady"></span>
            <span id="devtoolsStatusSecondary" class="statusPill" data-tone="muted" data-i18n="devtoolsStatusHint"></span>
        </div>
    </section>

    <div class="actionBar devtoolsActions" aria-label="DevTools actions">
        <section class="actionGroup" aria-labelledby="consoleToolsLabel">
            <p id="consoleToolsLabel" class="actionGroupLabel" data-i18n="devtoolsConsoleGroup"></p>
            <div class="actionGroupButtons">
                <button id="console-clear" class="iconified notext" data-i18n-title="devtoolsConsoleClearTip" type="button"><span class="fa-icon">trash-o</span><span class="hover"></span></button>
                <button id="console-fold" class="iconified notext" data-i18n-title="devtoolsConsoleFoldTip" type="button"><span class="fa-icon">double-angle-up</span><span class="hover"></span></button>
                <button id="console-unfold" class="iconified notext" data-i18n-title="devtoolsConsoleUnfoldTip" type="button"><span class="fa-icon fa-icon-vflipped">double-angle-up</span><span class="hover"></span></button>
            </div>
        </section>

        <section class="actionGroup" aria-labelledby="networkToolsLabel">
            <p id="networkToolsLabel" class="actionGroupLabel" data-i18n="devtoolsNetworkGroup"></p>
            <div class="actionGroupButtons">
                <button id="snfe-dump" type="button" data-i18n="devtoolsSnfeDump">_<span class="hover"></span></button>
                <button id="snfe-todnr" type="button" data-i18n="devtoolsSnfeToDnr">_<span class="hover"></span></button>
                <button id="snfe-benchmark" type="button" data-i18n="devtoolsSnfeBenchmark" disabled>_<span class="hover"></span></button>
            </div>
        </section>

        <section class="actionGroup" aria-labelledby="cosmeticToolsLabel">
            <p id="cosmeticToolsLabel" class="actionGroupLabel" data-i18n="devtoolsCosmeticGroup"></p>
            <div class="actionGroupButtons">
                <button id="cfe-dump" type="button" data-i18n="devtoolsCfeDump">_<span class="hover"></span></button>
                <button id="cfe-benchmark" type="button" data-i18n="devtoolsCfeBenchmark" disabled>_<span class="hover"></span></button>
                <button id="sfe-benchmark" type="button" data-i18n="devtoolsSfeBenchmark" disabled>_<span class="hover"></span></button>
            </div>
        </section>

        <section class="actionGroup" aria-labelledby="maintenanceToolsLabel">
            <p id="maintenanceToolsLabel" class="actionGroupLabel" data-i18n="devtoolsMaintenanceGroup"></p>
            <div class="actionGroupButtons">
                <button id="purge-all-caches" type="button" data-i18n-title="devtoolsPurgeCachesTip"><span data-i18n="3pPurgeAll">_</span><span class="hover"></span></button>
            </div>
        </section>
    </div>
</main>
<div id="console" class="codeMirrorContainer codeMirrorBreakAll"></div>

<script src="lib/codemirror/lib/codemirror.js"></script>
<script src="lib/codemirror/addon/display/panel.js"></script>
<script src="lib/codemirror/addon/fold/foldcode.js"></script>
<script src="lib/codemirror/addon/fold/foldgutter.js"></script>
<script src="lib/codemirror/addon/scroll/annotatescrollbar.js"></script>
<script src="lib/codemirror/addon/search/searchcursor.js"></script>
<script src="lib/codemirror/addon/selection/active-line.js"></script>
<script src="lib/hsluv/hsluv-0.1.0.min.js"></script>

<script src="js/vapi.js"></script>
<script src="js/vapi-common.js"></script>
<script src="js/vapi-client.js"></script>

<script src="js/codemirror/search.js" type="module"></script>
<script src="js/codemirror/search-thread.js"></script>

<script src="js/fa-icons.js" type="module"></script>
<script src="js/theme.js" type="module"></script>
<script src="js/i18n.js" type="module"></script>
<script src="js/dashboard-common.js" type="module"></script>
<script src="js/devtools.js" type="module"></script>

</body>
</html>
