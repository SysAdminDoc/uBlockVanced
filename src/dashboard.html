<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
<meta name="color-scheme" content="light dark" />
<title data-i18n="dashboardName"></title>
<link rel="stylesheet" href="css/themes/default.css">
<link rel="stylesheet" href="css/fa-icons.css">
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="icon" type="image/png" href="img/icon_64.png">
</head>

<body class="notReady">
    
<div id="dashboard-nav" role="navigation" aria-label="uBlockVanced dashboard">
    <div class="nav-main">
        <div class="brandCluster">
            <span class="logo"><img data-i18n-title="extName" src="img/ublock.svg" alt="uBlockVanced"></span>
            <span class="productName" data-i18n="extName"></span>
        </div>
        <div class="tabStrip" role="tablist" aria-label="Dashboard sections">
            <button class="tabButton" type="button" role="tab" aria-selected="false" tabindex="-1" data-pane="settings.html" data-i18n="settingsPageName"></button><!--
         --><button class="tabButton" type="button" role="tab" aria-selected="false" tabindex="-1" data-pane="3p-filters.html" data-i18n="3pPageName"></button><!--
         --><button class="tabButton" type="button" role="tab" aria-selected="false" tabindex="-1" data-pane="1p-filters.html" data-i18n="1pPageName"></button><!--
         --><button class="tabButton" type="button" role="tab" aria-selected="false" tabindex="-1" data-pane="dyna-rules.html" data-i18n="rulesPageName"></button><!--
         --><button class="tabButton" type="button" role="tab" aria-selected="false" tabindex="-1" data-pane="whitelist.html" data-i18n="whitelistPageName"></button><!--
         --><button class="tabButton" type="button" role="tab" aria-selected="false" tabindex="-1" data-pane="support.html" data-i18n="supportPageName"></button><!--
         --><button class="tabButton" type="button" role="tab" aria-selected="false" tabindex="-1" data-pane="about.html" data-i18n="aboutPageName"></button><!--
         --><button class="tabButton" type="button" role="tab" aria-selected="false" tabindex="-1" data-pane="no-dashboard.html"></button>
        </div>
    </div>
</div>
<section id="unsavedWarning" class="notice" role="dialog" aria-modal="true" aria-labelledby="unsavedWarningText" tabindex="-1">
    <div>
        <span id="unsavedWarningText" data-i18n="dashboardUnsavedWarning"></span>&emsp;
        <button type="button" data-i18n="dashboardUnsavedWarningStay">_<span class="hover"></span></button>&ensp;
        <button type="button" data-i18n="dashboardUnsavedWarningIgnore">_<span class="hover"></span></button>
    </div>
    <div></div>
</section>

<iframe id="iframe" src="blank.html" title="Dashboard content"></iframe>

<script src="lib/hsluv/hsluv-0.1.0.min.js"></script>

<script src="js/vapi.js"></script>
<script src="js/vapi-common.js"></script>
<script src="js/vapi-client.js"></script>

<script src="js/fa-icons.js" type="module"></script>
<script src="js/theme.js" type="module"></script>
<script src="js/i18n.js" type="module"></script>
<script src="js/dashboard.js" type="module"></script>
<script src="js/dashboard-common.js" type="module"></script>

</body>
</html>
