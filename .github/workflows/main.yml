name: uBlockVanced release

on:
  create:
    branches: master
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. 0.2.0)'
        required: false

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write
    name: Build packages
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Clone uAssets
        run: |
          tools/pull-assets.sh
      - name: Get release information
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            # Validate tag format
            if ! echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid tag format: $TAG (expected X.Y.Z)"
              exit 1
            fi
            echo "VERSION=$TAG" >> $GITHUB_ENV
          elif echo "$GITHUB_REF" | grep -q '^refs/tags/'; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "::error::No version tag found. Provide a tag input or push a tag."
            exit 1
          fi
      - name: Build MV2 packages
        run: |
          tools/make-chromium.sh ${{ env.VERSION }}
          tools/make-firefox.sh ${{ env.VERSION }}
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uBlockVanced-${{ env.VERSION }}
          path: |
            dist/build/uBlock0_${{ env.VERSION }}.chromium.zip
            dist/build/uBlock0_${{ env.VERSION }}.firefox.xpi
      - name: Assemble release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          > release.body.txt
          grep -m1 -B10000 -- "----------" CHANGELOG.md >> release.body.txt
          sed -e 's/%version%/${{ env.VERSION }}/g' .github/workflows/RELEASE.HEAD.md >> release.body.txt
      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: ${{ env.VERSION }}
          name: uBlockVanced ${{ env.VERSION }}
          draft: true
          prerelease: true
          body_path: release.body.txt
          files: |
            dist/build/uBlock0_${{ env.VERSION }}.chromium.zip
            dist/build/uBlock0_${{ env.VERSION }}.firefox.xpi
      - name: Upload to release (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag != ''
        run: |
          gh release upload "${{ env.VERSION }}" \
            dist/build/uBlock0_${{ env.VERSION }}.chromium.zip \
            dist/build/uBlock0_${{ env.VERSION }}.firefox.xpi \
            --clobber || true
        env:
          GH_TOKEN: ${{ github.token }}
